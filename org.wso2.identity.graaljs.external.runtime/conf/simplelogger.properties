# Configuration for slf4j-simple. The runtime picks this file up from the
# classpath; bin/runtime.sh adds ${graaljs.runtime.home}/conf as the first
# entry on the classpath via -Dconf.location.

org.slf4j.simpleLogger.defaultLogLevel=info
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss.SSS
org.slf4j.simpleLogger.showThreadName=true
org.slf4j.simpleLogger.showLogName=true
org.slf4j.simpleLogger.showShortLogName=false
org.slf4j.simpleLogger.levelInBrackets=true

# Quieter defaults for chatty third-party packages.
org.slf4j.simpleLogger.log.io.grpc.netty=warn
org.slf4j.simpleLogger.log.io.netty=warn
