# WSO2 Identity GraalJS Runtime — deployment configuration.
#
# Each setting can also be supplied as a JVM system property, which always
# overrides the value defined here. CLI positional overrides
# (`runtime.sh run [port] [statementLimit] [threadPoolSize]`) take precedence
# over both.
#
# Settings are read once at process start; restart the runtime to apply changes.

# ---- Server -----------------------------------------------------------------

# gRPC listener port. The Identity Server's GrpcConnectionManager must point
# at this port via the matching client-side configuration.
server.port=50051

# Worker thread pool used to dispatch script execution requests off the gRPC
# event loop. Size for the expected concurrent adaptive-auth flows.
server.thread.pool.size=10

# ---- Script engine ----------------------------------------------------------

# Maximum JS statements a single script may execute before GraalVM aborts it
# with a ResourceLimits exception. Tune up for complex adaptive scripts.
script.statement.limit=5000

# ---- mTLS (channel credentials) --------------------------------------------
# Mutual TLS is mandatory — the gRPC stream carries the full
# JsAuthenticationContext (username, tenant, claims, session id) and host
# function payloads, so plaintext is rejected at startup.
#
# By default the runtime loads keystore + truststore from its bundled classpath
# resources (the same wso2carbon.p12 / client-truststore.p12 the IS pack ships
# with). Override the paths below to point at operator-supplied material —
# typically the IS pack's own security folder when co-located.
#
# mtls.keystore.path=${graaljs.runtime.home}/repository/resources/security/wso2carbon.p12
# mtls.keystore.password=wso2carbon
# mtls.keystore.key.password=wso2carbon
# mtls.truststore.path=${graaljs.runtime.home}/repository/resources/security/client-truststore.p12
# mtls.truststore.password=wso2carbon
