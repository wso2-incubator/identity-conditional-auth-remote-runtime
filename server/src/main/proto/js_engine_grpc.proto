syntax = "proto3";

package org.wso2.carbon.identity.graaljs.engine.proto;

option java_package = "org.wso2.carbon.identity.graaljs.proto.grpc";
option java_multiple_files = true;
option java_outer_classname = "JsEngineGrpcProtos";

import "js_engine.proto";

// ============ gRPC Service Definitions ============

/**
 * JsEngineService - Main service for JavaScript evaluation
 * Used by RemoteJsEngine to send evaluation and callback execution requests
 */
service JsEngineService {
    // Evaluate JavaScript code
    rpc Evaluate(EvaluateRequest) returns (EvaluateResponse) {}

    // Execute a serialized callback function
    rpc ExecuteCallback(ExecuteCallbackRequest) returns (ExecuteCallbackResponse) {}
}

/**
 * HostCallbackService - Callback service for host function invocations
 * Used by External to call back to IS for host functions (executeStep, sendError, etc.)
 */
service HostCallbackService {
    // Invoke a host function from JavaScript
    rpc InvokeHostFunction(HostFunctionRequest) returns (HostFunctionResponse) {}

    // Get a context property value (for dynamic context proxy)
    rpc GetContextProperty(ContextPropertyRequest) returns (ContextPropertyResponse) {}

    // Set a context property value (write-back from External)
    rpc SetContextProperty(ContextPropertySetRequest) returns (ContextPropertySetResponse) {}
}

/**
 * JsEngineStreamingService - Bidirectional streaming service
 * Replaces both JsEngineService and HostCallbackService with a single stream.
 * IS opens a stream, sends requests, receives callbacks, sends callback responses,
 * and finally receives the evaluation result - all on one connection.
 */
service JsEngineStreamingService {
    // Single bidirectional stream for entire script execution lifecycle
    rpc ExecuteScript(stream StreamMessage) returns (stream StreamMessage) {}
}
